name: Docker Hub Publish

# Triggered by a semver git tag (e.g. ``git tag v0.2.0 && git push --tags``).
# The tag is the single source of truth for the release version — there
# is no VERSION file to keep in sync and no bot commit-and-bump dance.
#
# workflow_dispatch lets a maintainer re-run a release build from the
# GitHub UI against an existing tag without pushing a new one.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # pre-releases (-rc.1, -beta.2, …)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without the v prefix, e.g. 0.2.0)'
        required: true
        type: string

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      major: ${{ steps.v.outputs.major }}
      minor: ${{ steps.v.outputs.minor }}
      is_prerelease: ${{ steps.v.outputs.is_prerelease }}
    steps:
      - name: Compute version + rolling tags
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Strip refs/tags/v prefix from github.ref (e.g. refs/tags/v0.2.0-rc.1 → 0.2.0-rc.1)
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Parse semver; pre-release part (after -) disables rolling tags + latest
          CORE="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CORE"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"
          if [ "$VERSION" != "$CORE" ]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Publishing v${VERSION} (prerelease=$([ "$VERSION" != "$CORE" ] && echo true || echo false))"

  # One matrix job covers every (image × variant) combination. Only the
  # two torch-dependent images (septum, septum-api) ship a GPU variant;
  # web / gateway / audit / mcp are CPU-only because they either do not
  # import torch at all (web, gateway, audit) or run as a stdio
  # subprocess where GPU makes little practical difference (mcp).
  # GPU variants build linux/amd64 only — NVIDIA CUDA wheels are not
  # published for arm64, and Apple Silicon hosts do not run CUDA.
  publish:
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: septum
            dockerfile: docker/standalone.Dockerfile
            variant: cpu
            platforms: linux/amd64,linux/arm64
            title: Septum
            description: "Privacy-first AI middleware — anonymize documents, chat with LLMs, no raw PII leaves your machine."
          - image: septum
            dockerfile: docker/standalone.Dockerfile
            variant: gpu
            platforms: linux/amd64
            title: Septum (GPU)
            description: "Septum with NVIDIA GPU-accelerated PyTorch. linux/amd64 only. Same image as byerlikaya/septum but with full torch + CUDA runtime for batch document processing, OCR, and Whisper transcription."
          - image: septum-api
            dockerfile: docker/api.Dockerfile
            variant: cpu
            platforms: linux/amd64,linux/arm64
            title: Septum API
            description: "Septum API — FastAPI REST layer (air-gapped zone). Runs backend endpoints only; pair with septum-web for the dashboard."
          - image: septum-api
            dockerfile: docker/api.Dockerfile
            variant: gpu
            platforms: linux/amd64
            title: Septum API (GPU)
            description: "Septum API with NVIDIA GPU-accelerated PyTorch. linux/amd64 only."
          - image: septum-web
            dockerfile: docker/web.Dockerfile
            variant: cpu
            platforms: linux/amd64,linux/arm64
            title: Septum Web
            description: "Septum Web — Next.js 16 dashboard for Septum. Build-arg NEXT_PUBLIC_API_BASE_URL selects same-origin proxy or split deployment."
          - image: septum-gateway
            dockerfile: docker/gateway.Dockerfile
            variant: cpu
            platforms: linux/amd64,linux/arm64
            title: Septum Gateway
            description: "Septum Gateway — cloud LLM forwarder (internet-facing zone). Consumes masked requests from septum-queue; never imports septum-core."
          - image: septum-audit
            dockerfile: docker/audit.Dockerfile
            variant: cpu
            platforms: linux/amd64,linux/arm64
            title: Septum Audit
            description: "Septum Audit — compliance audit trail (internet-facing zone). JSONL sink + JSON / CSV / Splunk HEC exporters; never imports septum-core."
          - image: septum-mcp
            dockerfile: docker/mcp.Dockerfile
            variant: cpu
            platforms: linux/amd64,linux/arm64
            title: Septum MCP
            description: "Septum MCP — stdio MCP server exposing PII masking tools to Claude Code / Desktop / Cursor. Includes septum-core."

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="byerlikaya/${{ matrix.image }}"
          VERSION="${{ needs.resolve-version.outputs.version }}"
          VARIANT="${{ matrix.variant }}"
          IS_PRE="${{ needs.resolve-version.outputs.is_prerelease }}"

          if [ "$VARIANT" = "gpu" ]; then
            # GPU variant: suffix every tag with -gpu; 'gpu' floats to the
            # latest stable GPU release, 'latest' stays CPU.
            PRIMARY="${IMAGE}:${VERSION}-gpu"
            ROLLING="${IMAGE}:${{ needs.resolve-version.outputs.minor }}-gpu
          ${IMAGE}:${{ needs.resolve-version.outputs.major }}-gpu
          ${IMAGE}:gpu"
          else
            PRIMARY="${IMAGE}:${VERSION}"
            ROLLING="${IMAGE}:${{ needs.resolve-version.outputs.minor }}
          ${IMAGE}:${{ needs.resolve-version.outputs.major }}
          ${IMAGE}:latest"
          fi

          if [ "$IS_PRE" = "false" ]; then
            TAGS="${PRIMARY}
          ${ROLLING}"
          else
            TAGS="${PRIMARY}"
          fi

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image }} (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          provenance: false
          push: true
          build-args: |
            VERSION=${{ needs.resolve-version.outputs.version }}
            TORCH_VARIANT=${{ matrix.variant }}
          labels: |
            org.opencontainers.image.version=${{ needs.resolve-version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/byerlikaya/Septum
            org.opencontainers.image.url=https://hub.docker.com/r/byerlikaya/${{ matrix.image }}
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=MIT
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.variant }}

      - name: Update Docker Hub description
        # Only the CPU (primary) variant owns the Docker Hub README; GPU
        # variants re-use the same page under the '-gpu' tag namespace.
        if: matrix.variant == 'cpu'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: byerlikaya/${{ matrix.image }}
          short-description: ${{ matrix.description }}
          readme-filepath: ./DOCKERHUB.md

  github-release:
    needs: [resolve-version, publish]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so CHANGELOG context works

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          name: v${{ needs.resolve-version.outputs.version }}
          prerelease: ${{ needs.resolve-version.outputs.is_prerelease }}
          generate_release_notes: true
          body: |
            Docker images (CPU, linux/amd64 + linux/arm64):
            - `byerlikaya/septum:${{ needs.resolve-version.outputs.version }}` (standalone — SQLite + ML stack, ~5.7 GB)
            - `byerlikaya/septum-api:${{ needs.resolve-version.outputs.version }}`
            - `byerlikaya/septum-web:${{ needs.resolve-version.outputs.version }}`
            - `byerlikaya/septum-gateway:${{ needs.resolve-version.outputs.version }}` (internet-facing, ~250 MB)
            - `byerlikaya/septum-audit:${{ needs.resolve-version.outputs.version }}` (internet-facing, ~250 MB)
            - `byerlikaya/septum-mcp:${{ needs.resolve-version.outputs.version }}`

            Docker images (GPU — NVIDIA CUDA, linux/amd64 only):
            - `byerlikaya/septum:${{ needs.resolve-version.outputs.version }}-gpu`
            - `byerlikaya/septum-api:${{ needs.resolve-version.outputs.version }}-gpu`

            See [CHANGELOG.md](https://github.com/byerlikaya/Septum/blob/main/CHANGELOG.md) for detailed release notes.

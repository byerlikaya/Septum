name: Docker Hub Publish

on:
  push:
    tags:
      - "v*"
    branches:
      - main

env:
  COMBINED_IMAGE: byerlikaya/septum
  BACKEND_IMAGE: byerlikaya/septum-backend
  FRONTEND_IMAGE: byerlikaya/septum-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tags_combined=${{ env.COMBINED_IMAGE }}:${VERSION},${{ env.COMBINED_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "tags_backend=${{ env.BACKEND_IMAGE }}:${VERSION},${{ env.BACKEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "tags_frontend=${{ env.FRONTEND_IMAGE }}:${VERSION},${{ env.FRONTEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
            echo "tags_combined=${{ env.COMBINED_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "tags_backend=${{ env.BACKEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "tags_frontend=${{ env.FRONTEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push combined image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags_combined }}
          cache-from: type=gha,scope=combined
          cache-to: type=gha,mode=max,scope=combined

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags_backend }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags_frontend }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

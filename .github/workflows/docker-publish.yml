name: Docker Hub Publish

# Triggered when a commit to main contains [release] in its message.
# Version is read from the VERSION file, images are tagged and pushed,
# then VERSION is auto-bumped (patch) and committed back.
#
# Commit message tags:
#   [release]        — bump patch  (0.1.0 → 0.1.1)
#   [release:minor]  — bump minor  (0.1.0 → 0.2.0)
#   [release:major]  — bump major  (0.1.0 → 1.0.0)

on:
  push:
    branches:
      - main

env:
  IMAGE: byerlikaya/septum

jobs:
  publish:
    if: contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version and determine bump type
        id: version
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          MSG="${{ github.event.head_commit.message }}"

          if echo "$MSG" | grep -q '\[release:major\]'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$MSG" | grep -q '\[release:minor\]'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Publishing v${CURRENT}, next will be v${NEXT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.current }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=combined
          cache-to: type=gha,mode=max,scope=combined

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE }}
          short-description: "Privacy-first AI middleware — anonymize documents, chat with LLMs, no raw PII leaves your machine."
          readme-filepath: ./README.md

      - name: Bump version for next release
        run: |
          echo "${{ steps.version.outputs.next }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version to ${{ steps.version.outputs.next }}"
          git push

name: Docker Hub Publish

# Triggered when a [release] commit passes all CI tests.
# Publishes the version in the VERSION file, then bumps patch for next.

on:
  workflow_run:
    workflows: ["CI — tests, lint, security"]
    types: [completed]
    branches: [main]

env:
  IMAGE: byerlikaya/septum

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      contains(github.event.workflow_run.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Read version
        id: version
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          echo "next=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "Publishing v${CURRENT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.current }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=combined
          cache-to: type=gha,mode=max,scope=combined

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE }}
          short-description: "Privacy-first AI middleware — anonymize documents, chat with LLMs, no raw PII leaves your machine."
          readme-filepath: ./README.md

      - name: Bump version for next release
        run: |
          echo "${{ steps.version.outputs.next }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version to ${{ steps.version.outputs.next }}"
          git push

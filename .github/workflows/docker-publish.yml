name: Docker Hub Publish

# Triggered when a commit to main contains [release] in its message.
# Version is read from the VERSION file, images are tagged and pushed,
# then VERSION is auto-bumped (patch) and committed back.
#
# Commit message tags:
#   [release]        — bump patch  (0.1.0 → 0.1.1)
#   [release:minor]  — bump minor  (0.1.0 → 0.2.0)
#   [release:major]  — bump major  (0.1.0 → 1.0.0)

on:
  push:
    branches:
      - main

env:
  COMBINED_IMAGE: byerlikaya/septum
  BACKEND_IMAGE: byerlikaya/septum-backend
  FRONTEND_IMAGE: byerlikaya/septum-frontend

jobs:
  publish:
    if: contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version and determine bump type
        id: version
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          MSG="${{ github.event.head_commit.message }}"

          if echo "$MSG" | grep -q '\[release:major\]'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$MSG" | grep -q '\[release:minor\]'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Publishing v${CURRENT}, next will be v${NEXT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push combined image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.COMBINED_IMAGE }}:${{ steps.version.outputs.current }}
            ${{ env.COMBINED_IMAGE }}:latest
          cache-from: type=gha,scope=combined
          cache-to: type=gha,mode=max,scope=combined

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.current }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.current }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Bump version for next release
        run: |
          echo "${{ steps.version.outputs.next }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version to ${{ steps.version.outputs.next }}"
          git push

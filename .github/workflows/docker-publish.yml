name: Docker Hub Publish

# Triggered by a semver git tag (e.g. ``git tag v0.2.0 && git push --tags``).
# The tag is the single source of truth for the release version — there
# is no VERSION file to keep in sync and no bot commit-and-bump dance.
#
# workflow_dispatch lets a maintainer re-run a release build from the
# GitHub UI against an existing tag without pushing a new one.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # pre-releases (-rc.1, -beta.2, …)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without the v prefix, e.g. 0.2.0)'
        required: true
        type: string

# Queue subsequent release runs instead of interleaving. Two tags pushed
# seconds apart would otherwise race to push :latest / :<major> etc. and
# the rolling tags could end up pointing at whichever build finished
# last, not the newer version.
concurrency:
  group: docker-publish
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_prerelease: ${{ steps.v.outputs.is_prerelease }}
    steps:
      - name: Compute version + prerelease flag
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Pre-release part (after -) disables rolling tags + latest.
          if [ "${VERSION}" != "${VERSION%%-*}" ]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing v${VERSION}"

  # One matrix job covers every (image × variant) combination. Only the
  # two torch-dependent images (septum, septum-api) ship a GPU variant;
  # web / gateway / audit / mcp are CPU-only because they either do not
  # import torch at all (web, gateway, audit) or run as a stdio
  # subprocess where GPU makes little practical difference (mcp).
  # GPU variants build linux/amd64 only — NVIDIA CUDA wheels are not
  # published for arm64, and Apple Silicon hosts do not run CUDA.
  #
  # When adding torch to another image, append a matching gpu row here
  # and update the description cluster below.
  publish:
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: septum
            dockerfile: docker/standalone.Dockerfile
            variant: cpu
            platforms: linux/amd64,linux/arm64
            title: Septum
            description: "Privacy-first AI middleware — mask PII locally, chat with any LLM, raw data never leaves."
          - image: septum
            dockerfile: docker/standalone.Dockerfile
            variant: gpu
            platforms: linux/amd64
            title: Septum (GPU)
            description: "Septum with NVIDIA GPU-accelerated PyTorch. linux/amd64 only. Same image as byerlikaya/septum but with full torch + CUDA runtime for batch document processing, OCR, and Whisper transcription."
          - image: septum-api
            dockerfile: docker/api.Dockerfile
            variant: cpu
            platforms: linux/amd64,linux/arm64
            title: Septum API
            description: "Septum FastAPI backend — air-gapped zone. Document pipeline, PII masking, chat, auth, audit."
          - image: septum-api
            dockerfile: docker/api.Dockerfile
            variant: gpu
            platforms: linux/amd64
            title: Septum API (GPU)
            description: "Septum API with NVIDIA GPU-accelerated PyTorch. linux/amd64 only."
          - image: septum-gateway
            dockerfile: docker/gateway.Dockerfile
            variant: cpu
            platforms: linux/amd64,linux/arm64
            title: Septum Gateway
            description: "Septum cloud LLM forwarder — internet-facing zone. Never imports septum-core by invariant."
          - image: septum-audit
            dockerfile: docker/audit.Dockerfile
            variant: cpu
            platforms: linux/amd64,linux/arm64
            title: Septum Audit
            description: "Septum compliance audit log — JSONL sink + JSON / CSV / Splunk HEC exporters. No raw PII."
          - image: septum-mcp
            dockerfile: docker/mcp.Dockerfile
            variant: cpu
            platforms: linux/amd64,linux/arm64
            title: Septum MCP
            description: "Septum MCP server — stdio / streamable-http / sse. PII masking tools for any MCP client."

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: byerlikaya/${{ matrix.image }}
          # CPU variants get full semver + latest; GPU variants get the
          # same rolling tree suffixed with -gpu and 'gpu' as the
          # floating alias (instead of 'latest'). Pre-releases skip
          # 'latest' / 'gpu' automatically via enable conditions.
          flavor: |
            latest=false
            suffix=${{ matrix.variant == 'gpu' && '-gpu' || '' }},onlatest=true
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.version }}
            type=raw,value=${{ needs.resolve-version.outputs.version }},enable=${{ needs.resolve-version.outputs.is_prerelease == 'false' }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.resolve-version.outputs.version }},enable=${{ needs.resolve-version.outputs.is_prerelease == 'false' }}
            type=semver,pattern={{major}},value=v${{ needs.resolve-version.outputs.version }},enable=${{ needs.resolve-version.outputs.is_prerelease == 'false' }}
            type=raw,value=${{ matrix.variant == 'gpu' && 'gpu' || 'latest' }},enable=${{ needs.resolve-version.outputs.is_prerelease == 'false' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push ${{ matrix.image }} (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          provenance: false
          push: true
          build-args: |
            VERSION=${{ needs.resolve-version.outputs.version }}
            TORCH_VARIANT=${{ matrix.variant }}
            ${{ matrix.extra_build_args }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.variant }}

      - name: Update Docker Hub description
        # GPU tags re-use the same Docker Hub README under the -gpu
        # tag namespace; only the CPU variant owns the page.
        if: matrix.variant == 'cpu'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: byerlikaya/${{ matrix.image }}
          short-description: ${{ matrix.description }}
          readme-filepath: ./docker/readmes/${{ matrix.image }}.md

  # septum-web is special-cased out of the QEMU-based matrix above.
  # It is the only image that runs a heavy production build during
  # docker build (Next.js 16 webpack on Node.js 20). Under QEMU
  # arm64 emulation that build can stretch past two hours and
  # silently OOM, blocking every release. Instead we build each
  # platform on its own native runner (GitHub provides free arm64
  # runners for public repos via the ubuntu-24.04-arm label) and
  # then assemble the multi-arch manifest in a follow-up job. End
  # result is bit-for-bit identical to the QEMU path:
  # byerlikaya/septum-web:<version> with linux/amd64 + linux/arm64
  # under one tag, OCI labels intact, Docker Hub README synced.
  publish-web:
    needs: resolve-version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_id: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_id: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (labels only — tags applied at manifest merge)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: byerlikaya/septum-web
          labels: |
            org.opencontainers.image.title=Septum Web
            org.opencontainers.image.description=Septum Next.js 16 dashboard — setup wizard, approval gate, document preview, settings, audit.
            org.opencontainers.image.licenses=MIT

      - name: Build and push by digest (${{ matrix.arch_id }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          # push-by-digest publishes a digest reference under the
          # repository without attaching any human tag. The merge-web
          # job below collects per-arch digests and stitches them
          # into the multi-arch tags.
          outputs: type=image,name=byerlikaya/septum-web,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            VERSION=${{ needs.resolve-version.outputs.version }}
            TORCH_VARIANT=cpu
            BACKEND_INTERNAL_URL=http://api:8000
          cache-from: type=gha,scope=septum-web-${{ matrix.arch_id }}
          cache-to: type=gha,mode=max,scope=septum-web-${{ matrix.arch_id }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-septum-web-${{ matrix.arch_id }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-web:
    needs: [resolve-version, publish-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        # peter-evans/dockerhub-description reads
        # ./docker/readmes/septum-web.md from the workspace, so the repo
        # has to be on disk. The manifest-merge step itself does not need
        # any files — only the digests downloaded from the build jobs.
        uses: actions/checkout@v4

      - name: Download per-arch digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-septum-web-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (final multi-arch tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: byerlikaya/septum-web
          # Mirror the QEMU matrix tag set for CPU images: pinned
          # version + rolling major.minor / major / latest, plus
          # 'latest' alias suppressed for pre-releases. No -gpu
          # suffix because septum-web has no GPU variant.
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.resolve-version.outputs.version }},enable=${{ needs.resolve-version.outputs.is_prerelease == 'false' }}
            type=semver,pattern={{major}},value=v${{ needs.resolve-version.outputs.version }},enable=${{ needs.resolve-version.outputs.is_prerelease == 'false' }}
            type=raw,value=latest,enable=${{ needs.resolve-version.outputs.is_prerelease == 'false' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'byerlikaya/septum-web@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            byerlikaya/septum-web:${{ needs.resolve-version.outputs.version }}

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: byerlikaya/septum-web
          short-description: "Septum Next.js 16 dashboard — setup wizard, approval gate, document preview, settings, audit."
          readme-filepath: ./docker/readmes/septum-web.md

  github-release:
    needs: [resolve-version, publish, merge-web]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          name: v${{ needs.resolve-version.outputs.version }}
          prerelease: ${{ needs.resolve-version.outputs.is_prerelease }}
          generate_release_notes: true
          body: |
            Docker images (CPU, linux/amd64 + linux/arm64):
            - `byerlikaya/septum:${{ needs.resolve-version.outputs.version }}` (standalone — SQLite + ML stack, ~5.7 GB)
            - `byerlikaya/septum-api:${{ needs.resolve-version.outputs.version }}`
            - `byerlikaya/septum-web:${{ needs.resolve-version.outputs.version }}`
            - `byerlikaya/septum-gateway:${{ needs.resolve-version.outputs.version }}` (internet-facing, ~250 MB)
            - `byerlikaya/septum-audit:${{ needs.resolve-version.outputs.version }}` (internet-facing, ~250 MB)
            - `byerlikaya/septum-mcp:${{ needs.resolve-version.outputs.version }}`

            Docker images (GPU — NVIDIA CUDA, linux/amd64 only):
            - `byerlikaya/septum:${{ needs.resolve-version.outputs.version }}-gpu`
            - `byerlikaya/septum-api:${{ needs.resolve-version.outputs.version }}-gpu`

            See [CHANGELOG.md](https://github.com/byerlikaya/Septum/blob/main/CHANGELOG.md) for detailed release notes.

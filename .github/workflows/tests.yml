name: CI — tests, lint, security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt', 'packages/*/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies (modular packages + requirements.txt)
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          # Install the modular packages first so backend/app/ shims can
          # resolve 'from septum_api.* import *'. Editable install picks
          # up any on-repo changes without re-running pip.
          python -m pip install -e "../packages/core[transformers,test]"
          python -m pip install -e "../packages/queue[redis,test]"
          python -m pip install -e "../packages/api[auth,rate-limit,postgres,server,test]"
          python -m pip install -e "../packages/mcp[test]"
          python -m pip install -e "../packages/gateway[server,test]"
          python -m pip install -e "../packages/audit[queue,server,test]"
          # Heavy ML / OCR / Whisper / ingestion deps still live here
          # until the services/ layer migrates (P2.1 — shim removal).
          python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: |
          source .venv/bin/activate
          pytest

  modular-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-modular-${{ hashFiles('packages/*/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-modular-

      - name: Install septum-queue (+ redis + test extras)
        # Queue stays stdlib-only at runtime; [redis] pulls the Redis
        # Streams backend and fakeredis for the round-trip tests.
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/queue[redis,test]"
          pip install fakeredis

      - name: Install septum-core (+ transformers + test extras)
        run: pip install -e "packages/core[transformers,test]"

      - name: Install septum-mcp (+ test extra)
        run: pip install -e "packages/mcp[test]"

      - name: Install septum-gateway (+ server + test extras)
        # Server extra pulls fastapi+uvicorn so the /health smoke test
        # can import create_app; respx handles httpx mocking.
        run: pip install -e "packages/gateway[server,test]"

      - name: Install septum-audit (+ queue + server + test extras)
        run: pip install -e "packages/audit[queue,server,test]"

      - name: Download spaCy English model
        run: python -m spacy download en_core_web_sm

      - name: Run septum-queue tests
        run: pytest packages/queue/tests/ -q

      - name: Run septum-core tests
        run: pytest packages/core/tests/ -q

      - name: Run septum-mcp tests
        run: pytest packages/mcp/tests/ -q

      - name: Run septum-gateway tests
        run: pytest packages/gateway/tests/ -q

      - name: Run septum-audit tests
        run: pytest packages/audit/tests/ -q

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install linters
        run: pip install ruff bandit

      - name: Ruff lint
        working-directory: backend
        run: ruff check app/ --select E,W,F,I --ignore E501,E402,E741

      - name: Bandit security scan
        working-directory: backend
        run: bandit -r app/ -s B101,B603,B607 -q || true

  backend-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        working-directory: backend
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-* || true

  frontend-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: packages/web
        run: npm ci

      - name: Run frontend tests
        working-directory: packages/web
        run: npm test -- --runInBand

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: packages/web
        run: npm ci

      - name: TypeScript type check
        working-directory: packages/web
        run: npx tsc --noEmit

  frontend-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: packages/web
        run: npm ci

      - name: npm audit
        working-directory: packages/web
        run: npm audit --audit-level=high || true

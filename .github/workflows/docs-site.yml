name: Docs Site (VitePress)

# Builds the VitePress site under `docs/` from the canonical markdown
# (English at `docs/*.md`, Turkish at `docs/tr/*.md`) and deploys it to
# GitHub Pages at
# https://byerlikaya.github.io/Septum/.
#
# Triggered on every push to `main` that touches the docs source or the
# workflow itself. Manual re-runs available from the Actions UI via
# workflow_dispatch.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "assets/**"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build site
        working-directory: docs
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "septum-queue"
version = "0.1.0"
description = "Abstract message queue for Septum. Transports masked LLM requests and responses between the air-gapped zone and the internet-facing gateway. Never sees raw PII."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Septum contributors" },
]
keywords = ["queue", "message-broker", "redis", "streams", "privacy", "septum"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Security",
    "Topic :: System :: Distributed Computing",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

# septum-queue is the cross-zone bridge. It MUST NOT import septum-core or
# anything else that could carry raw PII semantics; the queue only ever
# transports already-masked payloads. The abstract interface has zero
# runtime dependencies (stdlib only); backend-specific clients are gated
# behind optional extras so an air-gapped install that only uses the file
# backend does not pull in redis / aio-pika.
dependencies = []

[project.optional-dependencies]
redis = [
    "redis>=5.2.0",
]
test = [
    "pytest>=9.0",
    "pytest-asyncio>=1.3",
]

[project.urls]
Homepage = "https://github.com/byerlikaya/Septum"
Repository = "https://github.com/byerlikaya/Septum"
Issues = "https://github.com/byerlikaya/Septum/issues"

[tool.hatch.build.targets.wheel]
packages = ["septum_queue"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

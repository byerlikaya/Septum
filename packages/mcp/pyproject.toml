[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "septum-mcp"
version = "0.1.0"
description = "Model Context Protocol server for Septum — expose PII masking, unmasking, and regulation packs to Claude Code, Claude Desktop, and other MCP clients."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Septum contributors" },
]
keywords = ["pii", "privacy", "mcp", "claude", "anonymization", "gdpr", "kvkk"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Security",
    "Topic :: Text Processing :: Linguistic",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

# septum-mcp runs in the air-gapped zone. It may talk to the local MCP
# stdio transport and it imports septum-core for masking, but it must
# never reach the public internet on its own. Dependencies are chosen
# accordingly: the MCP SDK is transport-only, the file parsers are
# pure-Python, and septum-core guarantees zero network deps.
dependencies = [
    "septum-core>=0.1.0",
    "mcp>=1.27.0",
    "pypdf>=6.10.2",
    "python-docx>=1.2.0",
    # uvicorn powers the optional --transport streamable-http / sse modes.
    # Pulled in by default so `pip install septum-mcp` gives the full
    # feature set; adds ~400 KB on top of starlette (already a transitive
    # dep of mcp) and has no runtime cost for stdio deployments.
    "uvicorn>=0.37",
]

[project.optional-dependencies]
test = [
    "pytest>=9.0",
    "pytest-asyncio>=1.3",
    "reportlab>=4.4",
    "httpx>=0.27",
]

[project.scripts]
septum-mcp = "septum_mcp.server:main"

[project.urls]
Homepage = "https://github.com/byerlikaya/Septum"
Repository = "https://github.com/byerlikaya/Septum"
Issues = "https://github.com/byerlikaya/Septum/issues"

[tool.hatch.build.targets.wheel]
packages = ["septum_mcp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

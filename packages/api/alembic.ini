[alembic]
script_location = alembic
# sqlalchemy.url is read from DATABASE_URL env var in env.py — not set here.
# To run locally: DATABASE_URL=postgresql+asyncpg://septum:septum_secret@localhost:5432/septum alembic upgrade head

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

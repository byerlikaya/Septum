[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "septum-core"
version = "0.1.0"
description = "Privacy-first PII detection, masking, and unmasking engine. Zero network dependencies."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Septum contributors" },
]
keywords = ["pii", "privacy", "anonymization", "gdpr", "kvkk", "hipaa", "presidio"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Security",
    "Topic :: Text Processing :: Linguistic",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

# CRITICAL: septum-core MUST NOT declare or transitively require any network
# library. No httpx, requests, aiohttp, urllib3, grpc, or similar. Any feature
# that needs network access is injected through a Protocol defined inside this
# package so the core stays air-gap safe.
dependencies = [
    "presidio-analyzer>=2.2.359",
    "presidio-anonymizer>=2.2.362",
    "spacy>=3.8.11",
    "pydantic>=2.10",
    "regex>=2024.11.6",
]

[project.optional-dependencies]
transformers = [
    "transformers>=4.57.0",
    "torch>=2.5.0",
]
test = [
    "pytest>=9.0",
    "pytest-asyncio>=1.3",
]

[project.urls]
Homepage = "https://github.com/byerlikaya/Septum"
Repository = "https://github.com/byerlikaya/Septum"
Issues = "https://github.com/byerlikaya/Septum/issues"

[tool.hatch.build.targets.wheel]
packages = ["septum_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="960" height="720" fill="#FAFAFA"/>

  <path d="M 480 80 L 480 115" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 420 190 L 250 225" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 540 190 L 710 225" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 250 300 L 250 335" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 250 445 L 250 480" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 340 395 L 710 395 L 710 560 L 710 585" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 250 555 L 250 605 L 380 605 L 380 605" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 710 305 L 710 560 L 710 585" stroke="#444" stroke-width="2" fill="none"/>

  <text x="320" y="215" font-size="11" font-weight="600" fill="#5E35B1" paint-order="stroke" stroke="#FAFAFA" stroke-width="4">SEARCH</text>
  <text x="600" y="215" font-size="11" font-weight="600" fill="#5E35B1" paint-order="stroke" stroke="#FAFAFA" stroke-width="4">CHAT</text>
  <text x="270" y="470" font-size="11" font-weight="600" fill="#2E7D32" paint-order="stroke" stroke="#FAFAFA" stroke-width="4">Evet</text>
  <text x="355" y="385" font-size="11" font-weight="600" fill="#C62828" paint-order="stroke" stroke="#FAFAFA" stroke-width="4">Hayır</text>

  <rect x="360" y="30" width="240" height="50" rx="25" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2" filter="url(#sh)"/>
  <text x="480" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#0D47A1">👤 Kullanıcı sorusu</text>

  <rect x="300" y="115" width="360" height="75" rx="10" fill="#F3E5F5" stroke="#8E24AA" stroke-width="2.5" filter="url(#sh)"/>
  <text x="480" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#4A148C">Yerel Ollama niyet sınıflandırıcısı</text>
  <text x="480" y="165" text-anchor="middle" font-size="11" fill="#4A148C">SEARCH veya CHAT arasında karar verir</text>
  <text x="480" y="182" text-anchor="middle" font-size="10" font-style="italic" fill="#6A1B9A">yalnızca document_ids boşken devreye girer</text>

  <rect x="120" y="225" width="260" height="75" rx="10" fill="#E8F5E9" stroke="#43A047" stroke-width="2" filter="url(#sh)"/>
  <text x="250" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">Tüm indekslenmiş dokümanlarda ara</text>
  <text x="250" y="270" text-anchor="middle" font-size="11" fill="#2E7D32">FAISS + BM25 hibrit</text>
  <text x="250" y="286" text-anchor="middle" font-size="10" fill="#2E7D32">yalnızca kullanıcının kendi dokümanları</text>

  <rect x="580" y="225" width="260" height="75" rx="10" fill="#E1F5FE" stroke="#0288D1" stroke-width="2" filter="url(#sh)"/>
  <text x="710" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#01579B">Direkt LLM cevabı</text>
  <text x="710" y="270" text-anchor="middle" font-size="11" fill="#0277BD">doküman bağlamı yok</text>
  <text x="710" y="286" text-anchor="middle" font-size="10" fill="#0277BD">düz sohbet yanıtı</text>

  <polygon points="250,335 340,395 250,455 160,395" fill="#FFF3E0" stroke="#FB8C00" stroke-width="2" filter="url(#sh)"/>
  <text x="250" y="388" text-anchor="middle" font-size="12" font-weight="600" fill="#E65100">Relevans skoru</text>
  <text x="250" y="405" text-anchor="middle" font-size="11" fill="#E65100">eşik üstünde mi?</text>

  <rect x="120" y="480" width="260" height="75" rx="10" fill="#DCEDC8" stroke="#689F38" stroke-width="2.5" filter="url(#sh)"/>
  <text x="250" y="508" text-anchor="middle" font-size="13" font-weight="700" fill="#33691E">🔍 Otomatik RAG</text>
  <text x="250" y="526" text-anchor="middle" font-size="11" fill="#33691E">maskeli parçalar + soru</text>
  <text x="250" y="542" text-anchor="middle" font-size="10" fill="#33691E">onay kapısından geçer</text>

  <rect x="280" y="585" width="400" height="60" rx="10" fill="#FFCC80" stroke="#E65100" stroke-width="2.5" filter="url(#sh)"/>
  <text x="480" y="612" text-anchor="middle" font-size="14" font-weight="700" fill="#BF360C">🛡️ Onay kapısı → Bulut LLM</text>
  <text x="480" y="632" text-anchor="middle" font-size="10" fill="#BF360C">kullanıcı, makineden ne çıktığını tam olarak görür</text>

  <text x="480" y="690" text-anchor="middle" font-size="11" fill="#777" font-style="italic">SSE meta event'i rag_mode: "manual" | "auto" | "none" + matched_document_ids taşır</text>
</svg>

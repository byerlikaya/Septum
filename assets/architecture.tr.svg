<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arrd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa0a6"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="900" height="1000" fill="#FAFAFA"/>

  <!-- Layer 1: Zones -->
  <rect x="60" y="20" width="780" height="130" fill="#FFF8E1" stroke="#FB8C00" stroke-width="2" stroke-dasharray="6 4" rx="12"/>
  <rect x="40" y="190" width="820" height="280" fill="#E8F5E9" stroke="#43A047" stroke-width="2" stroke-dasharray="6 4" rx="12"/>
  <rect x="40" y="620" width="820" height="200" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2" stroke-dasharray="6 4" rx="12"/>

  <text x="90" y="50" font-size="14" font-weight="600" fill="#E65100" paint-order="stroke" stroke="#FAFAFA" stroke-width="4">🖥️ MCP İstemcileri</text>
  <text x="70" y="220" font-size="14" font-weight="600" fill="#2E7D32" paint-order="stroke" stroke="#FAFAFA" stroke-width="4">🔒 Air-Gapped Bölge — ham PII burada kalır</text>
  <text x="70" y="650" font-size="14" font-weight="600" fill="#1565C0" paint-order="stroke" stroke="#FAFAFA" stroke-width="4">☁️ Internet-facing Bölge — yalnızca maskeli veri</text>

  <!-- Layer 2: Arrows -->
  <!-- Clients bus → septum-mcp (istek) -->
  <path d="M 200 120 L 200 165" stroke="#444" stroke-width="2" fill="none"/>
  <path d="M 450 120 L 450 165" stroke="#444" stroke-width="2" fill="none"/>
  <path d="M 700 120 L 700 165" stroke="#444" stroke-width="2" fill="none"/>
  <path d="M 200 165 L 700 165" stroke="#444" stroke-width="2" fill="none"/>
  <path d="M 700 165 L 700 260" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- septum-mcp → clients (cevap, tek dashed ok zone sınırına kadar) -->
  <path d="M 730 260 L 730 155" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#arrd)"/>
  <text x="742" y="200" font-size="11" fill="#777" font-style="italic" paint-order="stroke" stroke="#FAFAFA" stroke-width="4">cevap (stdio)</text>

  <!-- Air-gap içi istekler (solid) -->
  <path d="M 200 320 L 200 380" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 700 320 L 700 380" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 290 410 L 610 410" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Air-gap içi cevaplar (dashed, paralel offset) -->
  <path d="M 220 380 L 220 320" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#arrd)"/>
  <path d="M 720 380 L 720 320" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#arrd)"/>
  <path d="M 610 420 L 290 420" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#arrd)"/>

  <path d="M 200 440 C 200 500, 280 520, 360 545" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="235" y="510" font-size="12" fill="#444" font-style="italic" font-weight="500" paint-order="stroke" stroke="#FAFAFA" stroke-width="4">maskeli</text>

  <path d="M 450 580 L 450 670 L 250 670 L 250 700" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="460" y="625" font-size="12" fill="#444" font-style="italic" font-weight="500" paint-order="stroke" stroke="#FAFAFA" stroke-width="4">maskeli</text>

  <path d="M 360 735 L 540 735" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 250 770 L 250 860" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <path d="M 760 900 Q 870 900, 870 410 L 790 410" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#arrd)"/>
  <text x="885" y="665" font-size="11" fill="#777" font-style="italic" transform="rotate(-90, 885, 665)">cevap · yerelde geri yazılır</text>

  <!-- Layer 3: Modules -->
  <g filter="url(#sh)">
    <rect x="110" y="70" width="180" height="50" rx="8" fill="#37474F"/>
    <text x="200" y="101" font-size="13" font-weight="500" fill="#fff" text-anchor="middle">Claude Desktop</text>
  </g>
  <g filter="url(#sh)">
    <rect x="360" y="70" width="180" height="50" rx="8" fill="#37474F"/>
    <text x="450" y="101" font-size="13" font-weight="500" fill="#fff" text-anchor="middle">ChatGPT Desktop</text>
  </g>
  <g filter="url(#sh)">
    <rect x="610" y="70" width="180" height="50" rx="8" fill="#37474F"/>
    <text x="700" y="101" font-size="13" font-weight="500" fill="#fff" text-anchor="middle">Herhangi bir MCP istemcisi</text>
  </g>

  <g filter="url(#sh)">
    <rect x="110" y="260" width="180" height="60" rx="8" fill="#2E7D32"/>
    <text x="200" y="287" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">septum-web</text>
    <text x="200" y="306" font-size="12" fill="#C8E6C9" text-anchor="middle">Dashboard</text>
  </g>
  <g filter="url(#sh)">
    <rect x="610" y="260" width="180" height="60" rx="8" fill="#6A1B9A"/>
    <text x="700" y="287" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">septum-mcp</text>
    <text x="700" y="306" font-size="12" fill="#E1BEE7" text-anchor="middle">MCP Sunucusu</text>
  </g>
  <g filter="url(#sh)">
    <rect x="110" y="380" width="180" height="60" rx="8" fill="#1565C0"/>
    <text x="200" y="407" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">septum-api</text>
    <text x="200" y="426" font-size="12" fill="#BBDEFB" text-anchor="middle">REST API</text>
  </g>
  <g filter="url(#sh)">
    <rect x="610" y="380" width="180" height="60" rx="8" fill="#2E7D32"/>
    <text x="700" y="407" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">septum-core</text>
    <text x="700" y="426" font-size="12" fill="#C8E6C9" text-anchor="middle">PII Motoru</text>
  </g>

  <g filter="url(#sh)">
    <rect x="360" y="510" width="180" height="70" rx="8" fill="#E65100"/>
    <text x="450" y="540" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">septum-queue</text>
    <text x="450" y="562" font-size="12" fill="#FFCCBC" text-anchor="middle">📦 Köprü</text>
  </g>

  <g filter="url(#sh)">
    <rect x="140" y="700" width="220" height="70" rx="8" fill="#01579B"/>
    <text x="250" y="730" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">septum-gateway</text>
    <text x="250" y="752" font-size="12" fill="#B3E5FC" text-anchor="middle">LLM Yönlendirici</text>
  </g>
  <g filter="url(#sh)">
    <rect x="540" y="700" width="220" height="70" rx="8" fill="#01579B"/>
    <text x="650" y="730" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">septum-audit</text>
    <text x="650" y="752" font-size="12" fill="#B3E5FC" text-anchor="middle">Denetim Kaydı</text>
  </g>

  <g filter="url(#sh)">
    <rect x="140" y="860" width="620" height="80" rx="8" fill="#37474F"/>
    <text x="450" y="892" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">☁️ Bulut LLM'leri</text>
    <text x="450" y="915" font-size="12" fill="#CFD8DC" text-anchor="middle">Anthropic · OpenAI · OpenRouter</text>
  </g>
</svg>

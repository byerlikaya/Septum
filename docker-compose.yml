# Septum — combined image with PostgreSQL, Redis, optional Ollama
# No .env file needed. Just run: docker compose up
# For local LLMs: docker compose --profile ollama up

services:
  postgres:
    image: postgres:16-alpine
    container_name: septum-postgres
    environment:
      POSTGRES_USER: septum
      POSTGRES_PASSWORD: septum_secret
      POSTGRES_DB: septum
    ports:
      - "5432:5432"
    volumes:
      - septum-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U septum"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: septum-redis
    volumes:
      - septum-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3

  septum:
    build:
      context: .
      dockerfile: Dockerfile
    image: byerlikaya/septum:latest
    container_name: septum
    environment:
      - DATABASE_URL=postgresql+asyncpg://septum:septum_secret@postgres:5432/septum
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - septum-data:/app/data
      - septum-uploads:/app/uploads
      - septum-anon-maps:/app/anon_maps
      - septum-vector-indexes:/app/vector_indexes
      - septum-bm25-indexes:/app/bm25_indexes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: septum-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    profiles:
      - ollama

volumes:
  septum-pgdata:
  septum-redis-data:
  septum-data:
  septum-uploads:
  septum-anon-maps:
  septum-vector-indexes:
  septum-bm25-indexes:
  ollama-data:
